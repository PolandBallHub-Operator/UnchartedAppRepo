<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repository JSON Maker</title>

    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <!-- Import Map for Material Web -->
    <script type="importmap">
    {
        "imports": {
            "@material/web/": "https://esm.run/@material/web/"
        }
    }
    </script>

    <script>
        // 画像エラー時のフォールバック
        window.getPlaceholderSvg = function(text) {
            const cleanText = (text || 'App').substring(0, 3).replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="#e1e3e1"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#444746">${cleanText}</text></svg>`;
            return `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svgStr)))}`;
        };
    </script>

    <style>
        :root {
            --md-sys-color-primary: #0b57d0;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-background: #f8f9fa;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-surface-variant: #e1e3e1;
            --md-sys-color-on-surface: #1f1f1f;
            --md-ref-typeface-brand: 'Google Sans', sans-serif;
            --md-ref-typeface-plain: 'Roboto', sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--md-ref-typeface-plain);
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            padding-bottom: 40px;
        }

        header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            background: var(--md-sys-color-surface);
            border-bottom: 1px solid var(--md-sys-color-surface-variant);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-family: var(--md-ref-typeface-brand);
            font-size: 20px;
            margin-left: 12px;
        }

        main {
            max-width: 800px;
            margin: 24px auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: var(--md-sys-color-surface);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--md-sys-color-surface-variant);
        }

        .tool-box {
            background: #d3e3fd;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .output-container {
            position: relative;
            margin-top: 24px;
        }

        .json-line-output {
            background: #1e1e1e;
            color: #80ffea;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Roboto Mono', monospace;
            font-size: 13px;
            word-break: break-all;
            line-height: 1.4;
            min-height: 60px;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
        }

        .preview-mini {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            background: #f1f3f4;
            margin-top: 16px;
        }

        .preview-mini img {
            width: 48px; height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <header>
        <md-icon-button><span class="material-symbols-outlined">database</span></md-icon-button>
        <h1>Repository JSON Maker</h1>
    </header>

    <main>
        <!-- Favicon Helper -->
        <div class="tool-box">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px; font-weight:500;">
                <span class="material-symbols-outlined">auto_fix_high</span> Favicon & URL 取得
            </div>
            <div style="display:flex; gap:8px;">
                <md-outlined-text-field id="helper-url" label="PWAサイトのURL" style="flex:1;" placeholder="https://..."></md-outlined-text-field>
                <md-filled-button onclick="window.autoFill()">取得</md-filled-button>
            </div>
        </div>

        <div class="card">
            <div class="form-grid">
                <md-outlined-text-field label="JSON URL (Manifest/App JSON)" id="f-json" oninput="window.generate()"></md-outlined-text-field>
                <md-outlined-text-field label="アプリ名" id="f-name" oninput="window.generate()"></md-outlined-text-field>
                <md-outlined-text-field label="開発者名" id="f-dev" oninput="window.generate()"></md-outlined-text-field>
                <md-outlined-text-field label="アイコンURL" id="f-icon" oninput="window.generate()"></md-outlined-text-field>
                <md-outlined-select label="カテゴリー" id="f-cat" onchange="window.generate()">
                    <md-select-option value="Tools" selected><div slot="headline">Tools</div></md-select-option>
                    <md-select-option value="Productivity"><div slot="headline">Productivity</div></md-select-option>
                    <md-select-option value="Games"><div slot="headline">Games</div></md-select-option>
                    <md-select-option value="Education"><div slot="headline">Education</div></md-select-option>
                    <md-select-option value="Social"><div slot="headline">Social</div></md-select-option>
                    <md-select-option value="Lifestyle"><div slot="headline">Lifestyle</div></md-select-option>
                </md-outlined-select>
            </div>

            <div class="preview-mini">
                <img id="pre-img" src="" onerror="this.src=window.getPlaceholderSvg('App')">
                <div>
                    <div id="pre-name" style="font-weight:500;">App Name</div>
                    <div id="pre-info" style="font-size:12px; opacity:0.7;">Developer • Category</div>
                </div>
            </div>

            <div class="output-container">
                <div style="margin-bottom:8px; font-size:12px; font-weight:500; color:var(--md-sys-color-primary);">リポジトリ用JSON (1行形式):</div>
                <div id="out-json" class="json-line-output">{ }</div>
                <md-filled-tonal-button class="copy-btn" onclick="window.copyOutput()">
                    <md-icon slot="icon"><span class="material-symbols-outlined">content_copy</span></md-icon>
                    コピー
                </md-filled-tonal-button>
            </div>
            
            <p style="font-size:12px; color:var(--md-sys-color-outline); margin-top:16px;">
                ※この1行を <code>repo.json</code> の配列内に追加してください。
            </p>
        </div>
    </main>

    <script type="module">
        import '@material/web/all.js';

        window.autoFill = function() {
            const helperInput = document.getElementById('helper-url');
            let url = helperInput.value.trim();
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;

            try {
                const domain = new URL(url).hostname;
                // Icon from Google service
                const iconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
                
                document.getElementById('f-icon').value = iconUrl;
                // Guess common path for app json if not provided
                if(!document.getElementById('f-json').value) {
                    document.getElementById('f-json').value = url.endsWith('/') ? url + 'manifest.json' : url + '/manifest.json';
                }
                
                window.generate();
            } catch (e) {
                alert('URLを正しく入力してください');
            }
        };

        window.generate = function() {
            const data = {
                "json": document.getElementById('f-json').value || "",
                "name": document.getElementById('f-name').value || "App Name",
                "dev": document.getElementById('f-dev').value || "Developer",
                "icon": document.getElementById('f-icon').value || "",
                "category": document.getElementById('f-cat').value || "Tools"
            };

            // 改行なしのJSON文字列を作成
            const line = JSON.stringify(data);
            // 配列の要素として使いやすいように末尾にカンマを付ける
            document.getElementById('out-json').textContent = `${line},`;

            // Preview update
            document.getElementById('pre-name').textContent = data.name;
            document.getElementById('pre-info').textContent = `${data.dev} • ${data.category}`;
            document.getElementById('pre-img').src = data.icon || window.getPlaceholderSvg(data.name);
        };

        window.copyOutput = function() {
            const text = document.getElementById('out-json').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('コピーしました！repo.jsonの [ ] 内に貼り付けてください。');
            });
        };

        // 初期化
        window.generate();
    </script>
</body>
</html>
